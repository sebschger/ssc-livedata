services:
  dashboard-a:
    build: ./dashboard-a
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "3"

  sensor-data-pusher:
    build: ./sensor-data-pusher
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "3"
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "${NGINX_PUBLIC_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Für SSL
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      dashboard-a:
        condition: service_healthy
      sensor-data-pusher:
        condition: service_healthy
        
        
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"